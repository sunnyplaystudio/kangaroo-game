<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kangaroo Game</title>

<style>
body{
 margin:0;
 overflow:hidden;
 background:linear-gradient(#87CEEB,#4CAF50);
 font-family:Arial;
}

#game{
 position:relative;
 width:100vw;
 height:100vh;
}

/* HINT */
#hint{
 position:absolute;
 bottom:10px;
 width:100%;
 text-align:center;
 color:white;
 font-size:14px;
 background:#00000055;
 padding:5px;
}
</style>
</head>

<body>

<div id="game">
<div id="hint">Tap to jump</div>
</div>

<script>
let game=document.getElementById("game");
let hint=document.getElementById("hint");

let kangaroo={x:100,y:300,vy:0};
let gravity=0.8;
let jumping=false;
let obstacles=[];
let score=0;
let running=false;

function jump(){
 if(!jumping){
  kangaroo.vy=-15;
  jumping=true;
 }
}

game.addEventListener("click",()=>{
 if(!running){
  running=true;
  hint.style.display="none";
 }
 jump();
});

function spawnObstacle(){
 obstacles.push({x:window.innerWidth,y:350});
}

setInterval(()=>{
 if(running) spawnObstacle();
},1500);

function update(){
 if(!running) return;

 kangaroo.vy+=gravity;
 kangaroo.y+=kangaroo.vy;

 if(kangaroo.y>300){
  kangaroo.y=300;
  jumping=false;
 }

 obstacles.forEach(o=>{
  o.x-=6;

  if(Math.abs(o.x-kangaroo.x)<40 && kangaroo.y>260){
   running=false;
   alert("Game Over 😎 Skor: "+score);
   location.reload();
  }

  if(o.x<0){
   score++;
  }
 });

 obstacles=obstacles.filter(o=>o.x>-50);
}

function draw(){
 let ctx=game.getContext?game.getContext("2d"):null;
 if(!ctx){
  let canvas=document.createElement("canvas");
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  game.appendChild(canvas);
  ctx=canvas.getContext("2d");
  game.ctx=ctx;
 }else{
  ctx=game.ctx;
 }

 ctx.clearRect(0,0,window.innerWidth,window.innerHeight);

 ctx.font="40px Arial";
 ctx.fillText("🦘",kangaroo.x,kangaroo.y);

 obstacles.forEach(o=>{
  ctx.fillText("🌵",o.x,350);
 });

 ctx.font="20px Arial";
 ctx.fillText("Score: "+score,10,30);
}

setInterval(()=>{
 update();
 draw();
},1000/60);
</script>

</body>
</html>
